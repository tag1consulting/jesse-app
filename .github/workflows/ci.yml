name: CI

on:
  push:
  pull_request:

jobs:
  bridge:
    name: bridge (build, test, clippy, guards)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup component add clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bridge/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('bridge/Cargo.lock') }}

      - name: Build (release)
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Install gitleaks
        working-directory: ${{ github.workspace }}
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Source guards (incl. R5 personal-infra + gitleaks)
        working-directory: ${{ github.workspace }}
        run: bash scripts/ci-guards.sh
